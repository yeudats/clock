<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שעון נוכחות</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="rgb(165, 222, 255)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* מסתיר גלילה */
            background-color: rgb(165, 222, 255);
        }
        iframe {
            width: 100%;
            /* עושים את ה-iframe קצת יותר ארוך מהמסך כדי לדחוף את הבאנר של גוגל למטה מחוץ לשדה הראייה */
            height: calc(100% + 50px); 
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycbxj_SvCi8DX1D-Mr4EHry2EAWCtXNNvEvzHwkryPi46EjEZl5rwMmLM2p_oXcQrhLko/exec"></iframe>
    
    <script>
        // קוד קטן שרושם את ה-Service Worker כדי שהאפליקציה תוכל להיות מותקנת
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function(error) {
                console.log('Service worker registration failed:', error);
            });
        }
    </script>
</body>
</html>
